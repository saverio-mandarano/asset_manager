spring.application.name=asset_manager

# Data Source
spring.datasource.url=jdbc:mysql://localhost:3306/asset_manager_db
spring.datasource.username=root
spring.datasource.password=R00troot

# Hibernate properties
# The SQL dialect make Hibernate generate bettere SQL for the choosen database 
spring.jpa.properties.hibernate.dialect = org.hibernate.dialect.MySQLDialect

# Hibernate ddl auto(none, create, create-drop, validate, update)
spring.jpa.hibernate.ddl-auto=update

# Informazioni aggiuntive utili per il testing (da rimuovere)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Use default port 8080 for local development
server.port=8080


