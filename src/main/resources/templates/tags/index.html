<div th:fragment="content" class="text-white">
  <div class="d-flex align-items-center justify-content-between mb-5">
    <a
      sec:authorize="hasAuthority('ADMIN')"
      th:href="@{/tags/create}"
      class="btn btn-secondary"
    >
      <i class="fa-solid fa-plus"></i> Add Tag
    </a>
    <form th:action="@{/tags/searchByName}" method="get" class="d-flex">
      <input
        name="name"
        class="form-control me-2"
        placeholder="Search by name"
      />
      <button class="btn btn-primary">
        <i class="fa-solid fa-magnifying-glass p-1"></i>
      </button>
    </form>
  </div>

  <div>
    <table class="table table-dark table-striped table-hover">
      <thead>
        <tr>
          <th>
            <a
              th:href="@{/tags(sortBy='name', direction=${sortBy == 'name' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              NAME
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'name' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/tags(sortBy='type', direction=${sortBy == 'type' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              TYPE
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'type' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/tags(sortBy='assetsCount', direction=${sortBy == 'assetsCount' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              ASSETS COUNT
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'assetsCount' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th class="text-center">ACTIONS</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="tag : ${tags}">
          <td th:text="${tag.name}"></td>
          <td th:text="${tag.type}">
            <!-- <span
              th:text="${tag.type.label}"
              th:class="'badge bg-' +
              ${tag.type.badgeClass}"
            > 
          </span>
          --></td>
          <td th:text="${tag.assets.size()}"></td>
          <td class="text-center">
            <a
              th:href="@{/tags/{id}(id=${tag.id})}"
              class="btn btn-sm btn-outline-info me-2"
              ><i class="fa-solid fa-info p-1"></i>
            </a>
            <a
              sec:authorize="hasAuthority('ADMIN')"
              th:href="@{/tags/edit/{id}(id=${tag.id})}"
              class="btn btn-sm btn-outline-warning me-2"
              ><i class="fa-solid fa-pen-to-square p-1"></i
            ></a>
            <!-- delete -->
            <!-- th:action="@{/tags/delete/{id}(id=${tag.id})}" -->
            <!-- <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="fa-solid fa-trash p-1"></i>
              </button> -->
            <!-- end-delete -->
            <th:block sec:authorize="hasAuthority('ADMIN')">
              <button
                type="button"
                class="btn btn-sm btn-outline-danger"
                data-bs-toggle="modal"
                th:data-bs-target="|#delete-modal-${tag.id}|"
              >
                <i class="fa-solid fa-trash p-1"></i>
              </button>

              <div
                class="modal fade"
                th:id="|delete-modal-${tag.id}|"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog" data-bs-theme="dark">
                  <div
                    class="modal-content bg-dark text-white border-secondary"
                  >
                    <div class="modal-header">
                      <h4 class="modal-title">
                        <strong> Delete Tag</strong>
                      </h4>
                      <button
                        type="button"
                        class="btn-close-white btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"
                      ></button>
                    </div>
                    <div class="modal-body">
                      Are you sure you want to delete the tag: "<strong
                        th:text="${tag.name}"
                      ></strong
                      >"?
                      <div class="text-danger fs-6">
                        <strong> This action cannot be undone.</strong>
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                      >
                        Cancel
                      </button>
                      <form
                        th:action="@{/tags/delete/{id}(id=${tag.id})}"
                        method="post"
                      >
                        <button type="submit" class="btn btn-danger">
                          <i class="fa-solid fa-trash me-1"></i> Delete
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </th:block>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
