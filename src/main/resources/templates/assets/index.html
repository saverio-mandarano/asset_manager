<div th:fragment="content" class="text-white">
  <div class="d-flex align-items-center justify-content-between mb-5">
    <a
      th:href="@{/assets/create}"
      class="btn btn-secondary"
      sec:authorize="hasAuthority('ADMIN')"
    >
      <i class="fa-solid fa-plus"></i> Create New Asset
    </a>
    <form
      th:action="@{/assets/searchByTickerOrName}"
      method="get"
      class="d-flex"
    >
      <input
        name="query"
        class="form-control me-2"
        placeholder="Search by ticker or name"
      />
      <button class="btn btn-primary">
        <i class="fa-solid fa-magnifying-glass p-1"></i>
      </button>
    </form>
  </div>

  <div>
    <table class="table table-dark table-striped table-hover">
      <thead>
        <tr>
          <th>
            <a
              th:href="@{/assets(sortBy='ticker', direction=${sortBy == 'ticker' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              TICKER
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'ticker' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/assets(sortBy='name', direction=${sortBy == 'name' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              NAME
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'name' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/assets(sortBy='price', direction=${sortBy == 'price' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              LAST PRICE
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'price' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/assets(sortBy='category', direction=${sortBy == 'category' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              CATEGORY
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'category' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th class="text-center">ACTIONS</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="asset : ${assets}">
          <td th:text="${asset.ticker}"></td>
          <td th:text="${asset.name}"></td>
          <td th:text="'$ ' + ${asset.lastPrice}"></td>
          <td th:text="${asset.category}"></td>
          <td class="text-center">
            <a
              th:href="@{/assets/{id}(id=${asset.id})}"
              class="btn btn-sm btn-outline-info me-2"
              ><i class="fa-solid fa-info p-1"></i
            ></a>
            <a
              sec:authorize="hasAuthority('ADMIN')"
              th:href="@{/assets/edit/{id}(id=${asset.id})}"
              class="btn btn-sm btn-outline-warning me-2"
              ><i class="fa-solid fa-pen-to-square p-1"></i
            ></a>
            <th:block sec:authorize="hasAuthority('ADMIN')">
              <button
                type="button"
                class="btn btn-sm btn-outline-danger"
                data-bs-toggle="modal"
                th:data-bs-target="|#delete-modal-${asset.id}|"
              >
                <i class="fa-solid fa-trash p-1"></i>
              </button>

              <div
                class="modal fade"
                th:id="|delete-modal-${asset.id}|"
                tabindex="-1"
                aria-hidden="true"
              >
                <div class="modal-dialog" data-bs-theme="dark">
                  <div
                    class="modal-content bg-dark text-white border-secondary"
                  >
                    <div class="modal-header">
                      <h4 class="modal-title">
                        <strong> Delete Category</strong>
                      </h4>
                      <button
                        type="button"
                        class="btn-close-white btn-close"
                        data-bs-dismiss="modal"
                        aria-label="Close"
                      ></button>
                    </div>
                    <div class="modal-body">
                      Are you sure you want to delete the asset: "<strong
                        th:text="${asset.name}"
                      ></strong
                      >"?
                      <div class="text-danger fs-6">
                        <strong> This action cannot be undone.</strong>
                      </div>
                    </div>
                    <div class="modal-footer">
                      <button
                        type="button"
                        class="btn btn-secondary"
                        data-bs-dismiss="modal"
                      >
                        Cancel
                      </button>
                      <form
                        th:action="@{/assets/delete/{id}(id=${asset.id})}"
                        method="post"
                      >
                        <button type="submit" class="btn btn-danger">
                          <i class="fa-solid fa-trash me-1"></i> Delete
                        </button>
                      </form>
                    </div>
                  </div>
                </div>
              </div>
            </th:block>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
