<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}"
    />
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <title th:text="${pageTitle != null ? pageTitle : 'Backoffice'}"></title>
  </head>

  <body class="bg-black">
    <main>
      <!-- 404not found -->
      <div class="d-flex align-items-center justify-content-center">
        <div class="text-center text-white mt-5">
          <h1 class="display-1 fw-bold">404</h1>

          <p class="fs-2 fw-semibold mt-3">Page not found</p>

          <p class="text-danger mt-3 mb-5">
            The page you're looking for doesn't exist or has been moved.
          </p>

          <a
            href="/"
            class="btn btn-outline-light rounded-pill px-4 py-2 fw-semibold"
          >
            Back to HomePage
          </a>
        </div>
      </div>
    </main>
    <!-- Bootstrap bundle with popper-->
    <script
      th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
