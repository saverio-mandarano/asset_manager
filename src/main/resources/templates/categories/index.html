<div th:fragment="content" class="text-white">
  <div class="d-flex align-items-center justify-content-between mb-5">
    <a th:href="@{/categories/create}" class="btn btn-secondary">
      <i class="fa-solid fa-plus"></i> Create New Category
    </a>
    <form th:action="@{/categories/searchByName}" method="get" class="d-flex">
      <input
        name="name"
        class="form-control me-2"
        placeholder="Search by name"
      />
      <button class="btn btn-primary">
        <i class="fa-solid fa-magnifying-glass p-1"></i>
      </button>
    </form>
  </div>

  <div>
    <table class="table table-dark table-striped table-hover">
      <thead>
        <tr>
          <th>
            <a
              th:href="@{/categories(sortBy='name', direction=${sortBy == 'name' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              NAME
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'name' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/categories(sortBy='riskLevel', direction=${sortBy == 'riskLevel' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              RISK LEVEL
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'riskLevel' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th>
            <a
              th:href="@{/categories(sortBy='assetsCount', direction=${sortBy == 'assetsCount' and direction == 'asc' ? 'desc' : 'asc'})}"
              class="text-decoration-none text-light"
            >
              ASSETS COUNT
              <i
                class="fa-solid"
                th:classappend="${sortBy == 'assetsCount' ? (direction == 'asc' ? ' fa-sort-up' : ' fa-sort-down') : ' fa-sort'}"
              ></i>
            </a>
          </th>
          <th class="text-center">ACTIONS</th>
        </tr>
      </thead>
      <tbody>
        <tr th:each="category : ${categories}">
          <td th:text="${category.name}"></td>
          <td>
            <span
              th:text="${category.riskLevel.label}"
              th:class="'badge bg-' +
              ${category.riskLevel.badgeClass}"
            >
            </span>
          </td>
          <td th:text="${category.assets.size()}"></td>
          <td class="text-center">
            <a
              th:href="@{/categories/{id}(id=${category.id})}"
              class="btn btn-sm btn-outline-info me-2"
              ><i class="fa-solid fa-info p-1"></i>
            </a>
            <a
              th:href="@{/categories/edit/{id}(id=${category.id})}"
              class="btn btn-sm btn-outline-warning me-2"
              ><i class="fa-solid fa-pen-to-square p-1"></i
            ></a>
            <!-- delete -->
            <!-- th:action="@{/categories/delete/{id}(id=${category.id})}" -->
            <!-- <button type="submit" class="btn btn-sm btn-outline-danger">
                <i class="fa-solid fa-trash p-1"></i>
              </button> -->
            <!-- end-delete -->
            <button
              type="button"
              class="btn btn-sm btn-outline-danger"
              data-bs-toggle="modal"
              th:data-bs-target="|#delete-modal-${category.id}|"
            >
              <i class="fa-solid fa-trash p-1"></i>
            </button>

            <div
              class="modal fade"
              th:id="|delete-modal-${category.id}|"
              tabindex="-1"
              aria-hidden="true"
            >
              <div class="modal-dialog" data-bs-theme="dark">
                <div class="modal-content bg-dark text-white border-secondary">
                  <div class="modal-header">
                    <h4 class="modal-title">
                      <strong> Delete Category</strong>
                    </h4>
                    <button
                      type="button"
                      class="btn-close-white btn-close"
                      data-bs-dismiss="modal"
                      aria-label="Close"
                    ></button>
                  </div>
                  <div class="modal-body">
                    Are you sure you want to delete the category: "<strong
                      th:text="${category.name}"
                    ></strong
                    >"?
                    <div class="text-danger fs-6">
                      <strong> This action cannot be undone.</strong>
                    </div>
                  </div>
                  <div class="modal-footer">
                    <button
                      type="button"
                      class="btn btn-secondary"
                      data-bs-dismiss="modal"
                    >
                      Cancel
                    </button>
                    <form
                      th:action="@{/categories/delete/{id}(id=${category.id})}"
                      method="post"
                    >
                      <button type="submit" class="btn btn-danger">
                        <i class="fa-solid fa-trash me-1"></i> Delete
                      </button>
                    </form>
                  </div>
                </div>
              </div>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>
</div>
