<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}"
    />
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <title th:text="${pageTitle != null ? pageTitle : 'Backoffice'}"></title>
  </head>

  <body class="bg-black">
    <!-- login -->
    <main class="d-flex justify-content-center align-items-center my-5">
      <div class="card p-5 w-25 bg-dark">
        <div class="text-center mb-3">
          <i class="fa-solid fa-lock fa-2x text-primary"></i>
        </div>

        <div th:if="${param.error}" class="alert alert-danger py-2">
          Invalid username or password
        </div>
        <div th:if="${param.logout}" class="alert alert-success py-2">
          Logout successful
        </div>

        <form th:action="@{/login}" method="post">
          <div class="mb-3">
            <label class="form-label text-white">Username</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="fa-solid fa-user"></i
              ></span>
              <input
                type="text"
                name="username"
                class="form-control"
                required
              />
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label text-white">Password</label>
            <div class="input-group">
              <span class="input-group-text"
                ><i class="fa-solid fa-key"></i
              ></span>
              <input
                type="password"
                name="password"
                class="form-control"
                required
              />
            </div>
          </div>
          <button type="submit" class="btn btn-primary w-100">
            <i class="fa-solid fa-right-to-bracket me-2"></i>Login
          </button>
        </form>
      </div>
    </main>
    <!-- Bootstrap bundle with popper-->
    <script
      th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
