<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}"
    />
    <title th:text="${pageTitle != null ? pageTitle : 'Backoffice'}"></title>
  </head>

  <body class="bg-black">
    <div class="container-fluid">
      <div class="row">
        <!-- SIDEBAR -->
        <aside class="col-2 bg-light vh-100 m-3 p-3 bg-dark text-white">
          <th:block th:replace="fragments/sidebar :: sidebar"></th:block>
        </aside>

        <!-- CONTENT -->
        <main class="col-10 p-4">
          <!-- <th:block th:insert="~{::content}"></th:block> -->
        </main>
      </div>
    </div>

    <!-- Bootstrap bundle with popper-->
    <script
      th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
