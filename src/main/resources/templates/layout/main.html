<!doctype html>
<html
  xmlns:th="http://www.thymeleaf.org"
  xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap -->
    <link
      rel="stylesheet"
      th:href="@{/webjars/bootstrap/5.1.3/css/bootstrap.min.css}"
    />
    <!-- Font Awesome CDN -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
    />
    <title th:text="${pageTitle != null ? pageTitle : 'Backoffice'}"></title>
  </head>

  <body class="bg-black">
    <main>
      <div class="container-fluid">
        <div class="row">
          <!-- SIDEBAR -->
          <aside class="col-2 bg-light vh-100 m-3 p-3 bg-dark text-white">
            <th:block th:replace="~{fragments/sidebar :: sidebar}"></th:block>
          </aside>

          <!-- CONTENT -->
          <div class="col-9 p-4">
            <!-- sostituisco questo nodo con il fragment chiamato content, definito 
            nella view attualmente in rendering -->
            <th:block th:insert="~{${content}}"></th:block>
          </div>
        </div>
      </div>
    </main>
    <!-- Bootstrap bundle with popper-->
    <script
      th:src="@{/webjars/bootstrap/5.1.3/js/bootstrap.bundle.min.js}"
    ></script>
  </body>
</html>
